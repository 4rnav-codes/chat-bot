<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot</title>
    <style>
        #box::-webkit-scrollbar { width: 6px; }
        #box::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }

        body {
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .chat {
            width: 420px;
            height: 600px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            padding: 24px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
        }

        h3 { margin: 0 0 15px 0; font-size: 1.3rem; border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 15px; }

        #box {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .user, .bot {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            animation: fadeIn 0.3s ease;
        }

        .user {
            align-self: flex-end;
            background: #6366f1;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bot {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.1);
            border-bottom-left-radius: 4px;
        }

        .input-container {
            display: flex;
            gap: 10px;
            background: rgba(15, 23, 42, 0.5);
            padding: 8px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        input { flex-grow: 1; background: transparent; border: none; color: white; outline: none; padding-left: 10px; }
        button { background: #6366f1; color: white; border: none; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: bold; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="chat">
    <h3>🤖 AI Chatbot</h3>
    <div id="box"></div>
    <div class="input-container">
        <input id="input" placeholder="Say something..." onkeypress="if(event.key==='Enter') send()" />
        <button onclick="send()">Send</button>
    </div>
</div>

<script>

const API_KEY = "AIzaSyC7S4epmZIQLYt38QBwWJ2kkipmqSY1OIc"; 

function fallbackReply(msg) {
    msg = msg.toLowerCase();
    if (msg.includes("alphabet")) return "There are 26 letters in the English alphabet!";
    if (msg.includes("after a")) return "The letter 'B' comes after 'A'.";
    if (msg.includes("hello") || msg.includes("hi")) return "Hi there! How can I help you today?";
    return "I'm having trouble connecting to my brain (the API). Please check your API key!";
}

async function send() {
    let input = document.getElementById("input");
    let msg = input.value.trim();
    if (!msg) return;

    let box = document.getElementById("box");
    box.innerHTML += `<div class="user">${msg}</div>`;
    input.value = "";

    let loadingId = "load-" + Date.now();
    box.innerHTML += `<div class="bot" id="${loadingId}">...</div>`;
    box.scrollTop = box.scrollHeight;

    try {
        let res = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
            {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    contents: [{ parts: [{ text: msg }] }]
                })
            }
        );

        let data = await res.json();
        document.getElementById(loadingId).remove();

        if (data.candidates && data.candidates[0].content) {
            let reply = data.candidates[0].content.parts[0].text;
            box.innerHTML += `<div class="bot">${reply}</div>`;
        } else {
            // This triggers if the API key is "test" or invalid
            box.innerHTML += `<div class="bot">${fallbackReply(msg)}</div>`;
        }
    } catch (e) {
        document.getElementById(loadingId).remove();
        box.innerHTML += `<div class="bot">${fallbackReply(msg)}</div>`;
    }
    box.scrollTop = box.scrollHeight;
}
</script>
</body>
</html>
