<!DOCTYPE html>
<html>
<head>
  <title>Tathagat AI Assistant</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .chat {
      width: 400px;
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
    }
    #box {
      height: 300px;
      overflow-y: auto;
      margin-bottom: 10px;
    }
    .user { text-align: right; color: #38bdf8; margin: 5px; }
    .bot { text-align: left; color: #a78bfa; margin: 5px; }
    input {
      width: 75%;
      padding: 8px;
      border-radius: 8px;
      border: none;
    }
    button {
      padding: 8px;
      border-radius: 8px;
      border: none;
      background: #6366f1;
      color: white;
    }
  </style>
</head>
<body>

<div class="chat">
  <h3>🎓 Tathagat AI Assistant</h3>
  <div id="box"></div>

  <input id="input" placeholder="Ask something..." />
  <button onclick="send()">Send</button>
</div>

<script>
const API_KEY = "AIzaSyBICKj3JVvhgJAlbA153Cfrzqh4Dqtg1Lw"; 

async function send() {
  let input = document.getElementById("input");
  let msg = input.value.trim();
  if (!msg) return;

  let box = document.getElementById("box");
  box.innerHTML += `<div class="user">${msg}</div>`;

  input.value = "";

  try {
    let res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
      {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          contents: [{ parts: [{ text: msg }] }]
        })
      }
    );

    let data = await res.json();

    let reply =
      data?.candidates?.[0]?.content?.parts?.[0]?.text ||
      "No response";

    box.innerHTML += `<div class="bot">${reply}</div>`;
    box.scrollTop = box.scrollHeight;

  } catch (e) {
    box.innerHTML += `<div class="bot">Error: ${e.message}</div>`;
  }
}
</script>

</body>
</html>
