<!DOCTYPE html>
<html>
<head>
  <title>Tathagat AI Assistant</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .chat {
      width: 400px;
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
    }
    #box {
      height: 300px;
      overflow-y: auto;
      margin-bottom: 10px;
    }
    .user { text-align: right; color: #38bdf8; margin: 5px; }
    .bot { text-align: left; color: #a78bfa; margin: 5px; }
    .loading { color: #facc15; font-style: italic; }
    input {
      width: 75%;
      padding: 8px;
      border-radius: 8px;
      border: none;
    }
    button {
      padding: 8px;
      border-radius: 8px;
      border: none;
      background: #6366f1;
      color: white;
    }
  </style>
</head>
<body>

<div class="chat">
  <h3>🎓 Tathagat AI Assistant</h3>
  <div id="box"></div>

  <input id="input" placeholder="Ask something..." />
  <button onclick="send()">Send</button>
</div>

<script>
const API_KEY = "AIzaSyDkAXxLnGsXMlf2VXlTreLcNVm9qqJvhe4";

function fallbackReply(msg) {
  msg = msg.toLowerCase();

  if (msg.includes("admission")) return "Admissions usually start in June. Visit college office.";
  if (msg.includes("fees")) return "Fees vary by course. Contact admin office.";
  if (msg.includes("course")) return "We offer BSc, BA, BCom and more.";
  if (msg.includes("hello") || msg.includes("hi")) return "Hello! How can I help you?";
  
  return "I'm your college assistant. Ask about admissions, fees, or courses.";
}

async function send() {
  let input = document.getElementById("input");
  let msg = input.value.trim();
  if (!msg) return;

  let box = document.getElementById("box");

  box.innerHTML += `<div class="user">${msg}</div>`;
  input.value = "";

  let loadingId = "load-" + Date.now();
  box.innerHTML += `<div class="bot loading" id="${loadingId}">Typing...</div>`;
  box.scrollTop = box.scrollHeight;

  try {
    let res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`,
      {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          contents: [{
            parts: [{
              text: "You are a helpful college assistant. Answer briefly.\nUser: " + msg
            }]
          }]
        })
      }
    );

    let data = await res.json();
    console.log(data);

    let reply = "";

    if (data.candidates && data.candidates.length > 0) {
      reply = data.candidates[0].content.parts
        .map(p => p.text)
        .join(" ");
    } else if (data.error) {
      reply = "API Error: " + data.error.message;
    } else {
      reply = fallbackReply(msg);
    }

    document.getElementById(loadingId).remove();
    box.innerHTML += `<div class="bot">${reply}</div>`;
    box.scrollTop = box.scrollHeight;

  } catch (e) {
    document.getElementById(loadingId).remove();
    box.innerHTML += `<div class="bot">${fallbackReply(msg)}</div>`;
  }
}
</script>

</body>
</html>
