<!DOCTYPE html>
<html>
<head>
    <title>College Chatbot AI</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #74ebd5, #acb6e5);
        }

        .chatbox {
            width: 420px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 0px 10px gray;
        }

        #chat {
            height: 350px;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 10px;
            margin-bottom: 10px;
        }

        input {
            width: 75%;
            padding: 10px;
        }

        button {
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
        }

        .user {
            color: blue;
        }

        .bot {
            color: green;
        }
    </style>
</head>

<body>

<div class="chatbox">
    <h2>🎓 College Chatbot</h2>

    <div id="chat"></div>

    <input type="text" id="msg" placeholder="Ask something...">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
function sendMessage() {
    let msg = document.getElementById("msg").value;
    if (msg === "") return;

    let chat = document.getElementById("chat");

    chat.innerHTML += "<p class='user'><b>You:</b> " + msg + "</p>";

    fetch("/get", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: msg })
    })
    .then(res => res.json())
    .then(data => {
        chat.innerHTML += "<p class='bot'><b>Bot:</b> " + data.reply + "</p>";
        document.getElementById("msg").value = "";
        chat.scrollTop = chat.scrollHeight;
    });
}
</script>

</body>
</html>
