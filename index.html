<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TGBG </title>
    <style>
        #box::-webkit-scrollbar { width: 6px; }
        #box::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }

        body {
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .chat {
            width: 420px;
            height: 600px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            padding: 24px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
        }

        h3 { margin: 0 0 15px 0; font-size: 1.3rem; border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 15px; }

        #box {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .user, .bot {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            animation: fadeIn 0.3s ease;
        }

        .user {
            align-self: flex-end;
            background: #6366f1;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bot {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.1);
            border-bottom-left-radius: 4px;
        }

        .input-container {
            display: flex;
            gap: 10px;
            background: rgba(15, 23, 42, 0.5);
            padding: 8px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        input { flex-grow: 1; background: transparent; border: none; color: white; outline: none; padding-left: 10px; }
        button { background: #6366f1; color: white; border: none; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: bold; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="chat">
    <h3>🤖 TGBG Chatbot</h3>
    <div id="box"></div>
    <div class="input-container">
        <input id="input" placeholder="Ask OpenAI something..." onkeypress="if(event.key==='Enter') send()" />
        <button onclick="send()">Send</button>
    </div>
</div>

<script>

const OPENAI_API_KEY = "sk-efgh5678abcd1234efgh5678abcd1234efgh5678"; 

async function send() {
    let input = document.getElementById("input");
    let msg = input.value.trim();
    if (!msg) return;

    let box = document.getElementById("box");
    box.innerHTML += `<div class="user">${msg}</div>`;
    input.value = "";

    let loadingId = "load-" + Date.now();
    box.innerHTML += `<div class="bot" id="${loadingId}">Typing...</div>`;
    box.scrollTop = box.scrollHeight;

    try {
        let res = await fetch("https://api.openai.com/v1/chat/completions", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${OPENAI_API_KEY}`
            },
            body: JSON.stringify({
                model: "gpt-3.5-turbo",
                messages: [
                    { role: "system", content: "You are a friendly, normal AI chatbot." },
                    { role: "user", content: msg }
                ]
            })
        });

        let data = await res.json();
        document.getElementById(loadingId).remove();

        if (data.choices && data.choices[0].message) {
            let reply = data.choices[0].message.content;
            box.innerHTML += `<div class="bot">${reply}</div>`;
        } else {
            box.innerHTML += `<div class="bot">⚠️ Error: ${data.error ? data.error.message : "Something went wrong"}</div>`;
        }
    } catch (e) {
        document.getElementById(loadingId).remove();
        box.innerHTML += `<div class="bot">⚠️ Failed to connect to OpenAI.</div>`;
    }
    box.scrollTop = box.scrollHeight;
}
</script>
</body>
</html>
